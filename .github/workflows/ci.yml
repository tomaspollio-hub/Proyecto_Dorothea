name: CI

on:
  push:
    branches: [main]
    paths:
      - 'dorothea-erp/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'dorothea-erp/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: dorothea-erp

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dorothea-erp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
