name = "dorothea-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# El worker desplegado (este es el único ambiente real desplegado hasta ahora)
# corre como "production". Para desarrollo local, `wrangler dev` sobreescribe
# este valor con APP_ENV=development definido en .dev.vars (gitignored).
APP_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "dorothea-db"
database_id = "7ff88668-6088-4f65-963c-7dc76ae2d7a2"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "9f5aae7a0a3841d68b24e56c2f73d38d"

[[kv_namespaces]]
binding = "CACHE"
id = "52b8fa53df334e449756d08fb2a3a250"

[[kv_namespaces]]
binding = "ARCA_CONFIG"
id = "e09f63136ae3442a9d6eb52b6bf578e9"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "dorothea-storage"

# Secrets (configurar con `wrangler secret put JWT_SECRET`):
# JWT_SECRET

# NOTA (2026-06-16): los bloques [env.staging] y [env.production] de abajo son
# placeholders de Fase 0, NUNCA desplegados y NO funcionales tal como están:
# a un entorno con [env.X] hay que declararle sus propios bindings de D1/KV/R2
# (Wrangler no los hereda automáticamente del bloque top-level). El ambiente
# real desplegado hoy es el worker default de arriba ("dorothea-worker"), con
# APP_ENV=production seteado directamente.
#
# Decisión: no se provisionó un ambiente de staging real con recursos propios
# todavía. Para un solo desarrollador, antes de tener usuarios reales, el
# costo de mantener D1/KV/R2 duplicados no se justifica frente a la cobertura
# que ya dan los tests de integración (D1 real vía Miniflare en CI). Si se
# necesita staging real más adelante (ej. antes de la integración ARCA en
# producción con plata real), provisionar recursos nuevos y completar estos
# bloques con sus propios [[d1_databases]]/[[kv_namespaces]]/[[r2_buckets]].
[env.staging]
name = "dorothea-worker-staging"
vars = { APP_ENV = "staging" }

[env.production]
name = "dorothea-worker-production"
vars = { APP_ENV = "production" }
